<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <body>
    <div th:fragment="saida-form" class="bg-white rounded-lg shadow p-6 mt-4">
      <h2 class="text-base font-semibold text-gray-900 mb-4">
        Registrar Saída
      </h2>
      <form
        th:attr="hx-post=@{/veiculos/{id}/saida(id=${vm.id})}"
        hx-target="#details-content"
        hx-swap="outerHTML"
        class="space-y-4"
      >
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Funcionário</label
          >
          <select
            name="funcSaidaId"
            required
            class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="" disabled selected>Selecione...</option>
            <option
              th:each="f : ${vm.funcionarios}"
              th:value="${f.id}"
              th:text="${f.nome}"
            ></option>
          </select>
        </div>
        <div class="flex items-center gap-4 pt-1">
          <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700"
          >
            Confirmar Saída
          </button>
          <button
            type="button"
            onclick="document.getElementById('action-panel').innerHTML = ''"
            class="text-sm text-gray-500 hover:text-gray-700 cursor-pointer"
          >
            Cancelar
          </button>
        </div>
      </form>
    </div>

    <div th:fragment="volta-form" class="bg-white rounded-lg shadow p-6 mt-4">
      <h2 class="text-base font-semibold text-gray-900 mb-1">
        Registrar Volta
      </h2>
      <p
        th:if="${vm.saidaPendente != null}"
        class="text-sm text-gray-500 mb-4"
        th:text="'Saída em: ' + ${vm.saidaPendente}"
      ></p>
      <form
        th:attr="hx-post=@{/veiculos/{id}/volta(id=${vm.id})}"
        hx-target="#details-content"
        hx-swap="outerHTML"
        class="space-y-4"
      >
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Funcionário</label
          >
          <select
            name="funcVoltaId"
            required
            class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="" disabled selected>Selecione...</option>
            <option
              th:each="f : ${vm.funcionarios}"
              th:value="${f.id}"
              th:text="${f.nome}"
            ></option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >KM Percorrido</label
          >
          <input
            type="number"
            name="kmPercorrido"
            min="0"
            step="0.1"
            required
            class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div class="flex items-center gap-4 pt-1">
          <button
            type="submit"
            class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700"
          >
            Confirmar Volta
          </button>
          <button
            type="button"
            onclick="document.getElementById('action-panel').innerHTML = ''"
            class="text-sm text-gray-500 hover:text-gray-700 cursor-pointer"
          >
            Cancelar
          </button>
        </div>
      </form>
    </div>

    <div th:fragment="details-content" id="details-content">
      <div class="bg-white rounded-lg shadow p-6 mb-4">
        <div class="flex items-start justify-between">
          <div>
            <h1
              class="text-xl font-semibold text-gray-900"
              th:text="${vm.modelo}"
            ></h1>
            <p
              class="text-sm text-gray-500 font-mono mt-0.5"
              th:text="${vm.placa}"
            ></p>
          </div>
          <span
            th:replace="~{layout/fragments :: statusBadge(${vm.status})}"
          ></span>
        </div>

        <div class="mt-4 flex gap-6 text-sm text-gray-600">
          <span
            >Ano:
            <span class="font-medium text-gray-900" th:text="${vm.ano}"></span
          ></span>
          <span
            >KM:
            <span
              class="font-medium text-gray-900"
              th:text="${#numbers.formatDecimal(vm.km, 1, 'POINT', 0, 'COMMA')} + ' km'"
            ></span
          ></span>
        </div>

        <div class="mt-5 flex items-center gap-3 flex-wrap">
          <button
            th:if="${vm.status.name() == 'DISPONIVEL'}"
            th:attr="hx-get=@{/veiculos/{id}/saida-form(id=${vm.id})}"
            hx-target="#action-panel"
            hx-swap="innerHTML"
            class="flex items-center gap-1.5 bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 cursor-pointer"
          >
            <i class="bi bi-box-arrow-right text-base leading-none"></i>
            Registrar Saída
          </button>
          <button
            th:if="${vm.status.name() == 'INDISPONIVEL'}"
            th:attr="hx-get=@{/veiculos/{id}/volta-form(id=${vm.id})}"
            hx-target="#action-panel"
            hx-swap="innerHTML"
            class="flex items-center gap-1.5 bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 cursor-pointer"
          >
            <i class="bi bi-box-arrow-in-left text-base leading-none"></i>
            Registrar Volta
          </button>
          <a
            sec:authorize="hasRole('ADMINISTRADOR')"
            th:href="@{/veiculos/{id}/editar(id=${vm.id})}"
            class="flex items-center gap-1.5 border border-gray-300 text-gray-700 px-4 py-2 rounded text-sm hover:bg-gray-50"
          >
            <i class="bi bi-pencil text-base leading-none"></i>
            Editar
          </a>
          <div
            sec:authorize="hasRole('ADMINISTRADOR')"
            th:replace="~{layout/fragments :: deleteButton(@{/veiculos/{id}/excluir(id=${vm.id})})}"
          ></div>
        </div>
      </div>

      <div id="action-panel"></div>

      <div class="bg-white rounded-lg shadow overflow-hidden mt-4">
        <div class="px-6 py-4 border-b border-gray-100">
          <h2
            class="text-sm font-semibold text-gray-700 uppercase tracking-wide"
          >
            Histórico de Movimentações
          </h2>
        </div>
        <table class="w-full text-sm">
          <thead>
            <tr
              class="bg-gray-50 border-b border-gray-200 text-left text-xs uppercase tracking-wide text-gray-500"
            >
              <th class="px-4 py-3 font-medium">Saída</th>
              <th class="px-4 py-3 font-medium">Volta</th>
              <th class="px-4 py-3 font-medium">KM Percorrido</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(vm.movimentacoes)}">
              <td colspan="3" class="px-4 py-10 text-center text-gray-400">
                Nenhuma movimentação registrada.
              </td>
            </tr>
            <tr
              th:each="m : ${vm.movimentacoes}"
              class="border-b border-gray-100 last:border-0 hover:bg-gray-50"
            >
              <td class="px-4 py-3 text-gray-600">
                <span class="text-gray-400 text-xs mr-1">por</span
                ><span
                  class="font-medium text-gray-800"
                  th:text="${m.funcionarioSaida}"
                ></span
                ><span class="text-gray-400 text-xs mx-1">às</span
                ><span th:text="${m.dateSaida}"></span>
              </td>
              <td class="px-4 py-3">
                <span
                  th:if="${m.voltaPendente}"
                  class="inline-block w-fit text-xs px-2 py-0.5 rounded-full font-medium bg-amber-100 text-amber-800"
                  >Pendente</span
                >
                <span th:unless="${m.voltaPendente}" class="text-gray-600">
                  <span class="text-gray-400 text-xs mr-1">por</span
                  ><span
                    class="font-medium text-gray-800"
                    th:text="${m.funcionarioVolta}"
                  ></span
                  ><span class="text-gray-400 text-xs mx-1">às</span
                  ><span th:text="${m.dateVolta}"></span>
                </span>
              </td>
              <td class="px-4 py-3 text-gray-600">
                <span
                  th:if="${m.kmPercorrido != null}"
                  th:text="${#numbers.formatDecimal(m.kmPercorrido, 1, 'POINT', 0, 'COMMA')} + ' km'"
                ></span>
                <span
                  th:unless="${m.kmPercorrido != null}"
                  class="text-gray-400"
                  >--</span
                >
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
