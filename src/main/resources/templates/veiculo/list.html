<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{layout/fragments :: head('Veículos')}"></head>
  <body class="min-h-screen bg-gray-50">
    <nav th:replace="~{layout/fragments :: nav('veiculos')}"></nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
      <div
        th:if="${erro}"
        class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-6 text-sm"
        th:text="${erro}"
      ></div>

      <div class="flex items-center justify-between mb-6">
        <h1 class="text-xl font-semibold text-gray-900">Veículos</h1>
        <div class="flex items-center gap-4">
          <a
            th:href="@{/veiculos/relatorio}"
            class="flex items-center gap-1.5 border border-gray-300 text-gray-700 px-4 py-2 rounded text-sm hover:bg-gray-50"
          >
            <i class="bi bi-file-earmark-pdf text-base leading-none"></i>
            Exportar PDF
          </a>
          <a
            sec:authorize="hasRole('ADMINISTRADOR')"
            th:href="@{/veiculos/novo}"
            class="flex items-center gap-1.5 bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700"
          >
            <i class="bi bi-plus-lg text-base leading-none"></i>
            Novo Veículo
          </a>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr
              class="bg-gray-50 border-b border-gray-200 text-left text-xs uppercase tracking-wide text-gray-500"
            >
              <th class="px-4 py-3 font-medium">Modelo</th>
              <th class="px-4 py-3 font-medium">Placa</th>
              <th class="px-4 py-3 font-medium">Ano</th>
              <th class="px-4 py-3 font-medium">KM</th>
              <th class="px-4 py-3 font-medium">Status</th>
              <th class="px-4 py-3 font-medium">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(vm.veiculos)}">
              <td colspan="6" class="px-4 py-10 text-center text-gray-400">
                Nenhum veículo cadastrado.
              </td>
            </tr>
            <tr
              th:each="v : ${vm.veiculos}"
              class="border-b border-gray-100 last:border-0 hover:bg-gray-50"
            >
              <td
                class="px-4 py-3 font-medium text-gray-900"
                th:text="${v.modelo}"
              ></td>
              <td
                class="px-4 py-3 text-gray-600 font-mono"
                th:text="${v.placa}"
              ></td>
              <td class="px-4 py-3 text-gray-600" th:text="${v.ano}"></td>
              <td
                class="px-4 py-3 text-gray-600"
                th:text="${#numbers.formatDecimal(v.km, 1, 'POINT', 2, 'COMMA')} + ' km'"
              ></td>
              <td class="px-4 py-3">
                <span
                  th:replace="~{layout/fragments :: statusBadge(${v.status})}"
                ></span>
              </td>
              <td class="px-4 py-3">
                <a
                  th:href="@{/veiculos/{id}/detalhes(id=${v.id})}"
                  class="flex items-center gap-1.5 text-sm text-blue-600 hover:text-blue-800 w-fit"
                >
                  <i class="bi bi-eye text-base leading-none"></i>
                  Detalhes
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
