<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{layout/fragments :: head(${vm.id == null ? 'Novo Veículo' : 'Editar Veículo'})}"
  ></head>
  <body class="min-h-screen bg-gray-50">
    <nav th:replace="~{layout/fragments :: nav('veiculos')}"></nav>

    <main class="max-w-lg mx-auto px-4 py-10">
      <div class="bg-white rounded-lg shadow p-6">
        <h1
          class="text-lg font-semibold text-gray-900 mb-6"
          th:text="${vm.id == null ? 'Novo Veículo' : 'Editar Veículo'}"
        ></h1>

        <form
          th:object="${vm}"
          th:action="${vm.id == null ? '/veiculos/novo' : '/veiculos/' + vm.id + '/editar'}"
          method="post"
          class="space-y-4"
        >
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Modelo</label
            >
            <input
              type="text"
              th:field="*{modelo}"
              required
              class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Placa</label
            >
            <input
              type="text"
              th:field="*{placa}"
              required
              class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Ano</label
              >
              <input
                type="number"
                th:field="*{ano}"
                required
                min="1900"
                max="2100"
                class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">
                KM<span
                  th:if="${vm.id != null}"
                  class="text-gray-400 font-normal"
                >
                  (somente leitura)</span
                >
              </label>
              <input
                type="number"
                th:field="*{km}"
                step="0.1"
                min="0"
                th:readonly="${vm.id != null}"
                th:classappend="${vm.id != null} ? 'bg-gray-50 text-gray-500' : ''"
                class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Status</label
            >
            <select
              th:field="*{status}"
              class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option
                th:each="s : ${vm.statusOptions}"
                th:value="${s.name()}"
                th:text="${s.descricao}"
              ></option>
            </select>
          </div>

          <div class="flex items-center gap-4 pt-2">
            <button
              type="submit"
              class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700"
            >
              Salvar
            </button>
            <a th:replace="~{layout/fragments :: cancelLink(${vm.id == null ? '/veiculos' : '/veiculos/' + vm.id + '/detalhes'})}"></a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
