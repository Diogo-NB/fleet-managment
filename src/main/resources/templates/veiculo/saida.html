<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout/fragments :: head('Registrar Saída')}"></head>
  <body class="min-h-screen bg-gray-50">
    <nav th:replace="~{layout/fragments :: nav('veiculos')}"></nav>

    <main class="max-w-sm mx-auto px-4 py-10">
      <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-lg font-semibold text-gray-900">Registrar Saída</h1>
        <p
          class="text-sm text-gray-500 mt-1 mb-6"
          th:text="${vm.modelo} + ' — ' + ${vm.placa}"
        ></p>

        <div class="bg-gray-50 rounded px-3 py-2 mb-6 text-sm text-gray-600">
          KM atual:
          <span
            class="font-medium text-gray-900"
            th:text="${#numbers.formatDecimal(vm.km, 1, 'POINT', 0, 'COMMA')} + ' km'"
          ></span>
        </div>

        <form
          th:object="${vm}"
          th:action="@{/veiculos/{id}/saida(id=${vm.veiculoId})}"
          method="post"
          class="space-y-4"
        >
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Funcionário</label
            >
            <select
              th:field="*{funcSaidaId}"
              required
              class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="" disabled selected>Selecione...</option>
              <option
                th:each="f : ${vm.funcionarios}"
                th:value="${f.id}"
                th:text="${f.nome}"
              ></option>
            </select>
          </div>

          <div class="flex items-center gap-4 pt-2">
            <button
              type="submit"
              class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700"
            >
              Registrar Saída
            </button>
            <a th:replace="~{layout/fragments :: cancelLink('/veiculos')}"></a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
