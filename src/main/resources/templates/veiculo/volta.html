<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout/fragments :: head('Registrar Volta')}"></head>
  <body class="min-h-screen bg-gray-50">
    <nav th:replace="~{layout/fragments :: nav('veiculos')}"></nav>

    <main class="max-w-sm mx-auto px-4 py-10">
      <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-lg font-semibold text-gray-900">Registrar Volta</h1>
        <p
          class="text-sm text-gray-500 mt-1 mb-6"
          th:text="${vm.modelo} + ' — ' + ${vm.placa}"
        ></p>

        <div
          class="bg-gray-50 rounded px-3 py-3 mb-6 text-sm text-gray-600 space-y-1"
        >
          <div>
            KM atual:
            <span
              class="font-medium text-gray-900"
              th:text="${#numbers.formatDecimal(vm.kmAtual, 1, 'POINT', 0, 'COMMA')} + ' km'"
            ></span>
          </div>
          <div>
            Saída em:
            <span
              class="font-medium text-gray-900"
              th:text="${#temporals.format(vm.saidaEm, 'dd/MM/yyyy HH:mm')}"
            ></span>
          </div>
          <div>
            Saiu com:
            <span
              class="font-medium text-gray-900"
              th:text="${vm.nomeFuncSaida}"
            ></span>
          </div>
        </div>

        <form
          th:object="${vm}"
          th:action="@{/veiculos/{id}/volta(id=${vm.veiculoId})}"
          method="post"
          class="space-y-4"
        >
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Funcionário que retornou</label
            >
            <select
              th:field="*{funcVoltaId}"
              required
              class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="" disabled selected>Selecione...</option>
              <option
                th:each="f : ${vm.funcionarios}"
                th:value="${f.id}"
                th:text="${f.nome}"
              ></option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >KM percorrido</label
            >
            <input
              type="number"
              th:field="*{kmPercorrido}"
              step="0.1"
              min="0"
              required
              placeholder="0.0"
              class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="flex items-center gap-4 pt-2">
            <button
              type="submit"
              class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700"
            >
              Registrar Volta
            </button>
            <a th:replace="~{layout/fragments :: cancelLink('/veiculos')}"></a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
