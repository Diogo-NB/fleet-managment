<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{layout/fragments :: head(${vm.id == null ? 'Novo Funcionário' : 'Editar Funcionário'})}"
  ></head>
  <body class="min-h-screen bg-gray-50">
    <nav th:replace="~{layout/fragments :: nav('funcionarios')}"></nav>

    <main class="max-w-sm mx-auto px-4 py-10">
      <div class="bg-white rounded-lg shadow p-6">
        <h1
          class="text-lg font-semibold text-gray-900 mb-6"
          th:text="${vm.id == null ? 'Novo Funcionário' : 'Editar Funcionário'}"
        ></h1>

        <form
          th:object="${vm}"
          th:action="${vm.id == null ? '/funcionarios/novo' : '/funcionarios/' + vm.id + '/editar'}"
          method="post"
          class="space-y-4"
        >
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nome</label
            >
            <input
              type="text"
              th:field="*{nome}"
              required
              class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Contato</label
            >
            <input
              type="text"
              th:field="*{contato}"
              required
              class="border border-gray-300 rounded px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="flex items-center gap-4 pt-2">
            <button
              type="submit"
              class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700"
            >
              Salvar
            </button>
            <a
              th:replace="~{layout/fragments :: cancelLink('/funcionarios')}"
            ></a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
