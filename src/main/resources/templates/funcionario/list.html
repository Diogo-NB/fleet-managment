<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{layout/fragments :: head('Funcionários')}"></head>
  <body class="min-h-screen bg-gray-50">
    <nav th:replace="~{layout/fragments :: nav('funcionarios')}"></nav>

    <main class="max-w-3xl mx-auto px-4 py-8">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-xl font-semibold text-gray-900">Funcionários</h1>
        <a
          sec:authorize="hasRole('ADMINISTRADOR')"
          th:href="@{/funcionarios/novo}"
          class="flex items-center gap-1.5 bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700"
        >
          <i class="bi bi-plus-lg text-base leading-none"></i>
          Novo Funcionário
        </a>
      </div>

      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr
              class="bg-gray-50 border-b border-gray-200 text-left text-xs uppercase tracking-wide text-gray-500"
            >
              <th class="px-4 py-3 font-medium">Nome</th>
              <th class="px-4 py-3 font-medium">Contato</th>
              <th class="px-4 py-3 font-medium">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(vm.funcionarios)}">
              <td colspan="3" class="px-4 py-10 text-center text-gray-400">
                Nenhum funcionário cadastrado.
              </td>
            </tr>
            <tr
              th:each="f : ${vm.funcionarios}"
              class="border-b border-gray-100 last:border-0 hover:bg-gray-50"
            >
              <td
                class="px-4 py-3 font-medium text-gray-900"
                th:text="${f.nome}"
              ></td>
              <td class="px-4 py-3 text-gray-600" th:text="${f.contato}"></td>
              <td class="px-4 py-3">
                <div
                  sec:authorize="hasRole('ADMINISTRADOR')"
                  class="flex items-center gap-3"
                >
                  <a
                    th:href="@{/funcionarios/{id}/editar(id=${f.id})}"
                    class="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700"
                  >
                    <i class="bi bi-pencil text-base leading-none"></i>
                    Editar
                  </a>
                  <div
                    th:replace="~{layout/fragments :: deleteButton(@{/funcionarios/{id}/excluir(id=${f.id})})}"
                  ></div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
