<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout/fragments :: head('Login')}"></head>
  <body class="min-h-screen bg-gray-50 flex items-center justify-center">

    <div class="w-full max-w-sm bg-white rounded-lg shadow p-8">
      <h1 class="text-xl font-semibold text-gray-900 mb-6">Entrar</h1>

      <div th:if="${errorMessage}"
           class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm"
           th:text="${errorMessage}">
      </div>

      <div th:if="${logoutMessage}"
           class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded mb-4 text-sm"
           th:text="${logoutMessage}">
      </div>

      <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Usuário</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Senha</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-2 rounded text-sm font-medium hover:bg-blue-700 cursor-pointer"
        >
          Entrar
        </button>
      </form>
    </div>

  </body>
</html>
